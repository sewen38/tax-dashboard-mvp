*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 20% -10%,rgba(37,99,235,.16),transparent 28%),radial-gradient(circle at 85% 0,rgba(214,168,79,.14),transparent 28%),linear-gradient(180deg,#f8fbff 0%,var(--bg) 38%,#eef3f9 100%);color:var(--text);font-feature-settings:"tnum" 1,"cv03" 1}.app{display:flex;min-height:100vh}.sidebar{width:300px;background:linear-gradient(180deg,#07111f 0%,#0b1728 48%,#111827 100%);color:#dbeafe;padding:26px 20px;display:flex;flex-direction:column;gap:24px;position:sticky;top:0;height:100vh;box-shadow:22px 0 60px rgba(8,17,31,.22);overflow:hidden}.sidebar:before{content:"";position:absolute;inset:-120px -90px auto auto;width:230px;height:230px;background:radial-gradient(circle,rgba(214,168,79,.26),transparent 64%);pointer-events:none}.sidebar:after{content:"";position:absolute;inset:auto auto -130px -100px;width:260px;height:260px;background:radial-gradient(circle,rgba(37,99,235,.32),transparent 66%);pointer-events:none}.brand{position:relative;z-index:1;display:flex;align-items:center;gap:13px;color:#fff;font-size:18px;font-weight:900;letter-spacing:.01em;padding:4px 4px 18px;border-bottom:1px solid rgba(255,255,255,.08)}.brand div:last-child{line-height:1.25}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#1d4ed8 0%,#06b6d4 62%,#d6a84f 100%);display:grid;place-items:center;box-shadow:0 16px 35px rgba(37,99,235,.36),inset 0 1px 0 rgba(255,255,255,.35)}.nav{position:relative;z-index:1;display:flex;flex-direction:column;gap:9px;overflow:auto;padding:2px 2px 8px}.nav::-webkit-scrollbar{width:4px}.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:999px}.nav button{height:46px;border:1px solid transparent;border-radius:14px;display:flex;align-items:center;gap:10px;padding:0 14px;background:transparent;color:#9fb2c7;text-align:left;font-weight:800;cursor:pointer;transition:.22s ease;letter-spacing:.01em}.nav button:hover{background: adius:14px;background:linear-gradient(135deg,#111827,#1d4ed8);color:white;font-weight:850;box-shadow:0 14px 28px rgba(37,99,235,.24);cursor:pointer;transition:.22s ease}.create:hover{transform:translateY(-1px);box-shadow:0 18px 36px rgba(37,99,235,.30)}.content{padding:34px 36px 42px;max-width:1760px}.eyebrow{display:inline-flex;align-items:center;gap:8px;color:#1d4ed8;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.12);font-weight:900;margin-bottom:12px;padding:8px 12px;border-radius:999px;font-size:12px;letter-spacing:.12em;text-transform:uppercase}.eyebrow:before{content:"◆";color:var(--gold)}.title{font-size:44px;line-height:1.06;font-weight:950;letter-spacing:-.045em;margin:0 0 10px;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 52%,#0e7490 100%);-webkit-background-clip:text;background-clip:text;color:transparent}.desc{color:#667085;font-size:16px;line-height:1.75;margin:0 0 26px;max-width:940px}.stats{display:grid;grid-template-columns:repeat(6,minmax(140px,1fr));gap:18px;margin-bottom:2px}.card{background:rgba(255,255,255,.92);border:1px solid rgba(226,232,240,.96);border-radius:22px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}.stat{min-height:138px;padding:20px;position:relative;overflow:hidden;transition:.22s ease}.stat:before{content:"";position:absolute;right:-30px;top:-40px;width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,rgba(37,99,235,.14),rgba(6,182,212,.08));}.stat:after{content:"";position:absolute;left:20px;bottom:0;width:46px;height:3px;border-radius:999px;background:linear-gradient(90deg,#2563eb,#d6a84f)}.stat:hover{transform:translateY(-3px);box-shadow:0 26px 70px rgba(15,23,42,.12)}.label{color:#667085;font-weight:850;font-size:13px}.num{font-size:34px;font-weight:950;margin:14px 0 8px;letter-spacing:-.035em}.hint{font-size:13px;color:#98a2b3;font-weight:650}.quick{display:flex;gap:12px;margin:24px 0;flex-wrap:wrap}.quick button{height:40px;padding:0 16px;border-radius:999px;border:1px solid #d8e2ee;background:rgba(255,255,255,.82);color:#344054;font-weight:850;cursor:pointer;box-shadow:0 8px 18px rgba(15,23,42,.035);transition:.2s ease}.quick button.on,.quick button:hover{color:#1d4ed8;border-color:#93c5fd;background:#eff6ff;transform:translateY(-1px)}.filter{padding:22px;margin-bottom:22px}.grid{display:grid;grid-template-columns:1.55fr repeat(4,1fr);gap:15px}.field label{display:block;font-size:13px;color:#667085;font-weight:850;margin-bottom:8px}.input,select{height:44px;border:1px solid #d8e0eb;border-radius:14px;background:#fff;color:#475569;padding:0 13px;width:100%;font-size:14px;outline:none;box-shadow:0 8px 18px rgba(15,23,42,.025);transition:.2s ease}.input:focus,select:focus{border-color:#60a5fa;box-shadow:0 0 0 4px rgba(37,99,235,.10)}.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:18px}.btn{height:42px;border-radius:14px;padding:0 18px;font-weight:850;cursor:pointer;transition:.2s ease}.primary{background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;border:1px solid #2563eb;box-shadow:0 12px 24px rgba(37,99,235,.22)}.outline{background:#fff;border:1px solid #cbd5e1;color:#334155}.btn:hover{transform:translateY(-1px)}.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-bottom:22px}.charts.system{grid-template-columns:repeat(4,1fr)}.chart{padding:22px;min-height:222px;overflow:hidden;position:relative}.chart:before{content:"";position:absolute;right:-55px;bottom:-70px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,.10),transparent 64%)}.chart h3{position:relative;margin:0 0 16px;font-size:17px;letter-spacing:-.01em}.bars{position:relative;display:grid;gap:13px}.bar-row{display:grid;grid-template-columns:116px 1fr 42px;gap:11px;align-items:center;color:#475569;font-weight:800;font-size:13px}.bar-row span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{height:12px;background:#edf2fb;border-radius:999px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(15,23,42,.05)}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#1d4ed8,#06b6d4 70%,#d6a84f)}.donut{width:138px;height:138px;border-radius:50%;margin:10px auto;background:conic-gradient(#1d4ed8 0 35%,#06b6d4 35% 58%,#16a34a 58% 78%,#d6a84f 78% 100%);position:relative;box-shadow:0 18px 40px rgba(15,23,42,.10)}.donut:after{content:attr(data-text);white-space:pre;position:absolute;inset:27px;background:white;border-radius:50%;display:grid;place-items:center;font-weight:950;color:#0f172a;text-align:center;box-shadow:inset 0 0 0 1px #eef2f7}.table-card{overflow:hidden;border-radius:24px}.toolbar{height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--line);color:#667085;font-weight:850;background:linear-gradient(180deg,#fff,#fbfdff)}table{width:100%;border-collapse:collapse;background:white}th{height:52px;text-align:left;color:#667085;font-size:13px;border-bottom:1px solid var(--line);padding:0 16px;background:#f8fafc;white-space:nowrap;cursor:pointer;font-weight:900;letter-spacing:.01em}th:hover{color:#1d4ed8}td{padding:15px 16px;border-bottom:1px solid #edf2f7;vertical-align:middle;color:#344054;font-size:14px}tbody tr{transition:.16s ease}tbody tr:hover{background:#f8fbff}.maincell strong{display:block;font-size:15px;color:#101828;max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.maincell span{color:#667085;font-size:12px;margin-top:4px;display:block}.tag{display:inline-flex;font-size:12px;border-radius:999px;padding:6px 9px;background:#f1f5f9;color:#475569;font-weight:850;margin:2px}.blue{background:#dbeafe!important;color:#1d4ed8!important}.red{background:#fee2e2!important;color:#b91c1c!important}.orange{background:#ffedd5!important;color:#c2410c!important}.green{background:#dcfce7!important;color:#15803d!important}.purple{background:#ede9fe!important;color:#6d28d9!important}.status{display:inline-flex;border-radius:999px;padding:7px 10px;background:#e0f2fe;color:#0369a1;font-size:12px;font-weight:900;white-space:nowrap}.status.green{background:#dcfce7;color:#15803d}.status.red{background:#fee2e2;color:#b91c1c}.status.orange{background:#ffedd5;color:#c2410c}.pager{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:17px 20px;background:#fff}.pager button{height:36px;min-width:36px;border:1px solid #cbd5e1;background:white;border-radius:11px;cursor:pointer;font-weight:800;color:#334155}.pager button.active{background:linear-gradient(135deg,#2563eb,#06b6d4);color:white;border-color:#2563eb;box-shadow:0 10px 18px rgba(37,99,235,.18)}.pager button:disabled{opacity:.45;cursor:not-allowed}.pager span{color:#94a3b8}.empty{padding:40px;text-align:center;color:#667085}.mini{color:#667085;font-size:12px;line-height:1.7}@media(max-width:1500px){.stats{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:repeat(3,1fr)}.charts,.charts.system{grid-template-columns:1fr 1fr}.topsearch{width:300px}.sidebar{width:270px}.title{font-size:40px}}@media(max-width:980px){.app{display:block}.sidebar{position:relative;width:auto;height:auto}.nav{display:grid;grid-template-columns:repeat(2,1fr)}.topbar{position:relative;height:auto;flex-wrap:wrap;padding:18px}.topsearch{order:5;width:100%;margin-left:0}.content{padding:24px 18px}.stats,.grid,.charts,.charts.system{grid-template-columns:1fr}.title{font-size:34px}.table-card{overflow:auto}table{min-width:900px}}

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo">税</div><div>财税方案<br>数据驾驶舱</div></div>
    <nav class="nav" id="nav"></nav>
    <div class="logout">v3 多模块联动商业美化版<br>客户 / 方案 / 成交 / 佣金 / 会员全链路演示</div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="crumb" id="crumb"></div>
      <div class="topsearch"><input id="topSearch" placeholder="搜索客户、方案、国家、状态"></div>
      <div class="user"><div class="avatar">朱</div><div><div class="u1">朱洪雷</div><div class="u2">方案负责人</div></div></div>
      <button class="create" onclick="resetAll()">重置视图</button>
    </header>
    <section class="content">
      <div class="eyebrow" id="eyebrow">Executive Tax Dashboard</div>
      <h1 class="title" id="title"></h1>
      <div class="desc" id="desc"></div>
      <section class="stats" id="stats"></section>
      <div class="quick" id="quick"></div>
      <section class="card filter"><div class="grid" id="filters"></div><div class="actions"><button class="btn primary" onclick="applyFilters()">应用筛选</button><button class="btn outline" onclick="resetAll()">清空条件</button></div></section>
      <section class="charts" id="charts"></section>
      <section class="card table-card"><div class="toolbar"><span id="resultText"></span><span id="pageText"></span></div><table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table><div id="empty" class="empty" style="display:none">没有符合条件的数据，试试重置筛选。</div><div class="pager" id="pager"></div></section>
    </section>
  </main>
</div>
<script>
const $=id=>document.getElementById(id), pageSize=10;
const cn=['华盛国际','星河控股','鼎新实业','蓝海科技','远山资本','嘉禾贸易','安信家族','瑞和医疗','明德教育','启明新能源','宏图建设','云启咨询','金石投资','天成制造','恒远供应链','中晟集团','海纳资产','卓越传媒','信达生物','万象餐饮'];
const src=['微信小程序','渠道推荐','老客户转介绍','线下活动','官网咨询','私域社群'], countries=['新加坡,香港','美国,香港','日本,新加坡','土耳其,多米尼克','欧洲,澳大利亚','香港,新加坡','瓦努阿图,香港','美国,新加坡'], projects=['家办/税务规划','CRS资产合规','身份+税务组合','企业出海架构','快速身份','香港高才+税务','全球资产配置','家族信托规划'], budgets=['100-300万','300-800万','800-1500万','1500万以上'], grades=['A级','B级','C级','S级'], stages=['待回访','已提交问卷','诊断草案','方案沟通','合同洽谈','已签约'];
const dealStatus=['未成交','跟进中','已成交','暂停'], planStages=['诊断草案','A/B/C/D方案选择','方案已发送','客户已确认','已归档'], commStatus=['未结佣','部分结佣','已结佣'], payStatus=['未发放','待发放','已发放'], memberTypes=['体验会员','标准会员','高级会员','企业会员','黑金会员'], productTypes=['身份规划','税务规划','企业出海','家办信托','教育规划','资产配置'], remindPurposes=['首次回访','方案跟进','合同推进','补充资料','佣金提醒'];
function d(i,base='2026-06-12'){let x=new Date(base);x.setDate(x.getDate()-(i*3)%120);return x.toISOString().slice(0,10)} function addDays(s,n){let x=new Date(s);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)} function mid(b){return {'100-300万':200,'300-800万':550,'800-1500万':1150,'1500万以上':2000}[b]||0} function money(n){return Number(n||0).toLocaleString('zh-CN')} function uniq(rows,k){return [...new Set(rows.map(r=>r[k]).filter(v=>v!==undefined&&v!==''))]}
const customers=Array.from({length:100},(_,z)=>{let i=z+1,b=budgets[i%4];return {'客户名称':i<3?`示例客户${i===1?'A':'B'}`:`${cn[i%20]}${String(i).padStart(3,'0')}`,'客户编号':i<3?`CASE-00${i}`:`TAX-${String(i).padStart(4,'0')}`,'生成时间':d(i),'问卷链接':`https://example.com/q/${i}`,'客户来源':src[i%6],'意向国家':countries[i%8],'意向项目':projects[i%8],'预算区间':b,'客户等级':grades[i%4],'跟进阶段':stages[(i*2)%6],'成交状态':dealStatus[(i*5+Math.floor(i/7))%4],'金额':mid(b)*10000}});
const members=Array.from({length:100},(_,z)=>{let i=z+1,t=memberTypes[i%5],open=addDays('2025-11-01',i*4);return {'用户名称':`会员${cn[i%20]}${String(i).padStart(3,'0')}`,'会员类型':t,'开通日期':open,'到期日期':addDays(open, t==='黑金会员'?730:t==='企业会员'?365:180),'充值金额':[980,2980,6980,19800,49800][i%5],'状态':i%9===0?'即将到期':i%13===0?'已过期':'有效','渠道':src[i%6]}});
const products=Array.from({length:100},(_,z)=>{let i=z+1,type=productTypes[i%6],country=['新加坡','香港','美国','日本','土耳其','多米尼克','澳大利亚','欧洲','瓦努阿图','格鲁吉亚'][i%10];return {'项目名称':`${country}${type}项目${String(i).padStart(3,'0')}`,'国家/地区':country,'项目类型':type,'参考费用':[18,35,68,120,220,380][i%6]*10000,'参考周期':['1-3个月','3-6个月','6-9个月','9-12个月','12个月以上'][i%5],'佣金规则':`${[3,5,6,8,10][i%5]}%基础佣金 + 阶梯奖励`,'上架状态':i%11===0?'暂停':'在售'}});
const plans=Array.from({length:100},(_,z)=>{let i=z+1,c=customers[i%100];return {'方案名称':`${c['客户名称']}-${projects[i%8]}执行方案`,'客户名称':c['客户名称'],'方案阶段':planStages[(i*2)%5],'国家组合':countries[i%8],'方案链接':`https://example.com/plan/${i}`,'生成日期':d(i+4),'预估成交金额':mid(c['预算区间'])*10000}});
const deals=Array.from({length:100},(_,z)=>{let i=z+1,c=customers[(i*2)%100],amt=mid(c['预算区间'])*10000;return {'成交编号':`DEAL-${String(i).padStart(4,'0')}`,'客户名称':c['客户名称'],'成交日期':d(i+8),'成交国家':c['意向国家'].split(',')[0],'成交项目':c['意向项目'],'成交金额':amt,'佣金金额':Math.round(amt*(0.04+(i%5)/100)),'结佣状态':commStatus[i%3]}});
const commissions=Array.from({length:100},(_,z)=>{let i=z+1,dv=deals[i%100];return {'佣金编号':`COM-${String(i).padStart(4,'0')}`,'客户名称':dv['客户名称'],'国家':dv['成交国家'],'项目':dv['成交项目'],'佣金金额':dv['佣金金额'],'结佣状态':commStatus[(i+1)%3],'发放状态':payStatus[i%3],'预计结佣日期':addDays(dv['成交日期'],30+(i%5)*15),'实际发放日期':i%3===2?addDays(dv['成交日期'],50):''}});
const reminders=Array.from({length:100},(_,z)=>{let i=z+1,c=customers[i%100],p=remindPurposes[i%5];return {'提醒事项':`${c['客户名称']}-${p}`,'客户名称':c['客户名称'],'提醒日期':addDays('2026-06-01',i%45),'回访目的':p,'提醒话术':`围绕${c['意向项目']}确认下一步资料与预算节点`,'状态':['待回访','今日到期','已完成','已逾期'][i%4],'优先级':['高','中','低'][i%3]}});
const systemMetrics=Array.from({length:100},(_,z)=>{let i=z+1;return {'指标名称':['会员总数','有效会员','会员充值金额','产品在售数','客户转化率','待回访数','成交金额','佣金待发放'][i%8]+String(i).padStart(3,'0'),'单选':['增长','稳定','预警'][i%3],'统计日期':d(i),'附件':'','当前数值':Math.round(80+i*7+(i%5)*20),'指标口径':'由会员记录、客户管理、成交录单、佣金管理联动汇总','来源数据表':['会员记录','客户管理','成交录单','佣金管理','产品库'][i%5],'统计周期':['日','周','月','季度'][i%4],'更新方式':['自动联动','手动校准','定时刷新'][i%3]}});
const modules={personal:{icon:'总',title:'个人数据总览',desc:'原系统总览已改名：展示个人客户、方案、成交、佣金与回访的综合经营视图。',data:customers,heads:['客户名称','客户编号','客户来源','意向国家','意向项目','预算区间','客户等级','跟进阶段','成交状态','生成时间'],filters:['客户来源','客户等级','跟进阶段','成交状态'],charts:['客户来源','客户等级']},customers:{icon:'客',title:'客户管理',desc:'对应多维表「客户管理」：客户名称、编号、来源、意向国家/项目、预算、等级、阶段、成交状态。',data:customers,heads:['客户名称','客户编号','客户来源','意向国家','意向项目','预算区间','客户等级','跟进阶段','成交状态','生成时间'],filters:['客户来源','客户等级','跟进阶段','成交状态'],charts:['客户来源','预算区间']},plans:{icon:'案',title:'方案管理',desc:'对应多维表「方案管理」：方案名称、客户名称、方案阶段、国家组合、生成日期、预估成交金额。',data:plans,heads:['方案名称','客户名称','方案阶段','国家组合','生成日期','预估成交金额'],filters:['方案阶段','国家组合'],charts:['方案阶段','国家组合']},deals:{icon:'成',title:'成交录单',desc:'对应多维表「成交录单」：成交编号、客户、成交日期、国家、项目、金额、佣金、结佣状态。',data:deals,heads:['成交编号','客户名称','成交日期','成交国家','成交项目','成交金额','佣金金额','结佣状态'],filters:['成交国家','成交项目','结佣状态'],charts:['成交国家','结佣状态']},commissions:{icon:'佣',title:'佣金管理',desc:'对应多维表「佣金管理」：佣金编号、客户、国家、项目、佣金金额、结佣状态、发放状态。',data:commissions,heads:['佣金编号','客户名称','国家','项目','佣金金额','结佣状态','发放状态','预计结佣日期','实际发放日期'],filters:['国家','项目','结佣状态','发放状态'],charts:['结佣状态','发放状态']},members:{icon:'会',title:'会员记录',desc:'新增模块，对应多维表「会员记录」：用户名称、会员类型、开通/到期日期、充值金额。',data:members,heads:['用户名称','会员类型','开通日期','到期日期','充值金额','状态','渠道'],filters:['会员类型','状态','渠道'],charts:['会员类型','状态']},reminders:{icon:'访',title:'回访提醒',desc:'对应多维表「回访提醒」：提醒事项、客户名称、提醒日期、回访目的、提醒话术。',data:reminders,heads:['提醒事项','客户名称','提醒日期','回访目的','状态','优先级','提醒话术'],filters:['回访目的','状态','优先级'],charts:['状态','回访目的']},products:{icon:'品',title:'产品库',desc:'新增模块，对应多维表「产品库」：项目名称、国家/地区、项目类型、参考费用、参考周期、佣金规则。',data:products,heads:['项目名称','国家/地区','项目类型','参考费用','参考周期','佣金规则','上架状态'],filters:['国家/地区','项目类型','参考周期','上架状态'],charts:['项目类型','国家/地区']},system:{icon:'统',title:'系统总览',desc:'新增真实系统总览：以会员记录为核心联动客户、产品、成交、佣金，多图表仪表盘展示全局指标。',data:systemMetrics,heads:['指标名称','单选','统计日期','当前数值','指标口径','来源数据表','统计周期','更新方式'],filters:['来源数据表','统计周期','更新方式','单选'],charts:['来源数据表','统计周期','更新方式','单选'],system:true}};
const order=['personal','customers','plans','deals','commissions','members','reminders','products','system'];let cur='personal',state={keyword:'',filters:{},sort:'date_desc',page:1};
function fmt(v){if(typeof v==='number')return v.toLocaleString('zh-CN');return String(v??'')} function statusCls(v){return ['有效','已成交','已结佣','已发放','已完成','在售','增长'].includes(v)?'green':['已过期','已逾期','未结佣','未发放','暂停','预警'].includes(v)?'red':['即将到期','待发放','部分结佣','今日到期'].includes(v)?'orange':''} function mainKey(m){return m.heads[0]} function dateKey(m){return m.heads.find(h=>h.includes('日期')||h.includes('时间'))||''} function amountKeys(m){let keys=new Set([...(m.heads||[]),...Object.keys((m.data&&m.data[0])||{})]);return [...keys].filter(h=>h.includes('金额')||h.includes('费用')||h.includes('数值'))}
function initNav(){ $('nav').innerHTML=order.map(k=>`<button class="${k===cur?'active':''}" onclick="switchModule('${k}')">${modules[k].icon} ${modules[k].title}</button>`).join('') } function switchModule(k){cur=k;state={keyword:'',filters:{},sort:'date_desc',page:1};$('topSearch').value='';initNav();render()}
function filtered(){let m=modules[cur],kw=state.keyword.trim().toLowerCase();let rows=m.data.filter(r=>{let ok=!kw||Object.values(r).join(' ').toLowerCase().includes(kw);Object.entries(state.filters).forEach(([k,v])=>{if(v&&String(r[k])!==v)ok=false});return ok});let dk=dateKey(m), ak=amountKeys(m)[0];rows.sort((a,b)=>{if(state.sort==='date_desc'&&dk)return String(b[dk]).localeCompare(String(a[dk]));if(state.sort==='date_asc'&&dk)return String(a[dk]).localeCompare(String(b[dk]));if(state.sort==='amount_desc'&&ak)return Number(b[ak]||0)-Number(a[ak]||0);if(state.sort==='amount_asc'&&ak)return Number(a[ak]||0)-Number(b[ak]||0);return String(a[mainKey(m)]).localeCompare(String(b[mainKey(m)]),'zh')});return rows}
function renderStats(rows){let m=modules[cur],ak=amountKeys(m),total=rows.length,amount=ak.reduce((s,k)=>s+rows.reduce((x,r)=>x+Number(r[k]||0),0),0),active=rows.filter(r=>['有效','在售','已成交','已结佣','已发放','增长'].some(v=>Object.values(r).includes(v))).length,warn=rows.filter(r=>['已过期','已逾期','暂停','预警','未发放'].some(v=>Object.values(r).includes(v))).length;let arr=[['总记录',total,'当前筛选记录'],['有效/完成',active,'积极状态记录'],['预警/待处理',warn,'需要关注'],['金额/数值合计',amount?money(amount):'—','按金额字段汇总'],['当前页',state.page,'分页位置'],['测试数据','100组','每模块独立生成']];$('stats').innerHTML=arr.map(x=>`<div class="card stat"><div class="label">${x[0]}</div><div class="num">${x[1]}</div><div class="hint">${x[2]}</div></div>`).join('')}
function renderFilters(){let m=modules[cur];$('filters').innerHTML=`<div class="field"><label>搜索</label><input class="input" id="keyword" placeholder="输入关键词"></div>`+m.filters.map(k=>`<div class="field"><label>${k}</label><select data-f="${k}"><option value="">全部</option>${uniq(m.data,k).map(v=>`<option value="${v}">${v}</option>`).join('')}</select></div>`).join('')+`<div class="field"><label>排序</label><select id="sort"><option value="date_desc">最新日期</option><option value="date_asc">最早日期</option><option value="amount_desc">金额/数值最高</option><option value="amount_asc">金额/数值最低</option><option value="name_asc">名称排序</option></select></div>`;$('keyword').value=state.keyword;$('keyword').oninput=()=>{state.keyword=$('keyword').value;state.page=1;renderMain()};document.querySelectorAll('select[data-f]').forEach(s=>{s.value=state.filters[s.dataset.f]||'';s.onchange=()=>{state.filters[s.dataset.f]=s.value;state.page=1;renderMain()}});$('sort').value=state.sort;$('sort').onchange=()=>{state.sort=$('sort').value;state.page=1;renderMain()}}
function renderQuick(){let m=modules[cur];$('quick').innerHTML=`<button class="on" onclick="state.sort='date_desc';renderMain()">最新</button><button onclick="state.sort='amount_desc';renderMain()">金额/数值最高</button>${m.filters.slice(0,3).map(k=>`<button onclick="state.filters['${k}']='${uniq(m.data,k)[0]||''}';state.page=1;render()">${k}：${uniq(m.data,k)[0]||'全部'}</button>`).join('')}<button onclick="resetAll()">清空筛选</button>`}
function counts(rows,k){let o={};rows.forEach(r=>{let v=r[k]||'未填写';o[v]=(o[v]||0)+1});return Object.entries(o).sort((a,b)=>b[1]-a[1]).slice(0,8)} function chartHtml(rows,k){let c=counts(rows,k),max=Math.max(1,...c.map(x=>x[1]));return `<h3>${k}</h3><div class="bars">${c.map(([v,n])=>`<div class="bar-row"><span>${v}</span><div class="bar"><span style="width:${Math.max(6,n/max*100)}%"></span></div><b>${n}</b></div>`).join('')}</div>`}
function renderCharts(rows){let m=modules[cur];$('charts').className='charts'+(m.system?' system':'');let html=m.charts.map(k=>`<div class="card chart">${chartHtml(rows,k)}</div>`).join('');if(m.system)html+=`<div class="card chart"><h3>会员联动仪表盘</h3><div class="donut" data-text="会员\A联动"></div><div class="mini" style="text-align:center">会员记录 → 产品库 → 成交/佣金 → 系统指标</div></div>`;$('charts').innerHTML=html}
function cell(r,h,i){let v=r[h]??'';if(i===0)return `<td class="maincell"><strong>${fmt(v)}</strong><span>${fmt(r['客户编号']||r['客户名称']||r['用户名称']||r['国家/地区']||r['来源数据表']||'')}</span></td>`;if(h.includes('状态')||h==='单选'||h==='会员类型'||h==='客户等级')return `<td><span class="status ${statusCls(v)}">${fmt(v)}</span></td>`;if(h.includes('金额')||h.includes('费用')||h.includes('数值'))return `<td><b>${money(v)}</b></td>`;if(String(v).startsWith('http'))return `<td><span class="tag blue">链接</span></td>`;return `<td>${fmt(v)}</td>`}
function renderTable(rows){let m=modules[cur],pages=Math.max(1,Math.ceil(rows.length/pageSize));if(state.page>pages)state.page=pages;let part=rows.slice((state.page-1)*pageSize,state.page*pageSize);$('thead').innerHTML=m.heads.map(h=>`<th onclick="sortBy('${h}')">${h}</th>`).join('');$('tbody').innerHTML=part.map(r=>`<tr>${m.heads.map((h,i)=>cell(r,h,i)).join('')}</tr>`).join('');$('empty').style.display=rows.length?'none':'block';$('resultText').textContent=`共 ${rows.length} 条结果｜${m.title}`;$('pageText').textContent=`第 ${state.page} / ${pages} 页`;$('pager').innerHTML=`<button onclick="goPage(${state.page-1})" ${state.page===1?'disabled':''}>‹</button>`+Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-state.page)<=2).map((p,i,a)=>`${i&&p-a[i-1]>1?'<span>…</span>':''}<button class="${p===state.page?'active':''}" onclick="goPage(${p})">${p}</button>`).join('')+`<button onclick="goPage(${state.page+1})" ${state.page===pages?'disabled':''}>›</button>`}
function sortBy(h){state.sort=(h.includes('金额')||h.includes('费用')||h.includes('数值'))?'amount_desc':(h.includes('日期')||h.includes('时间'))?'date_desc':'name_asc';state.page=1;renderMain()} function render(){let m=modules[cur];$('crumb').textContent='后台 / '+m.title;$('title').textContent=m.title;$('desc').textContent=m.desc;renderFilters();renderQuick();renderMain()} function renderMain(){let rows=filtered();renderStats(rows);renderCharts(rows);renderTable(rows)} function applyFilters(){state.keyword=$('keyword')?.value||'';state.page=1;renderMain()} function resetAll(){state={keyword:'',filters:{},sort:'date_desc',page:1};$('topSearch').value='';render()} function goPage(p){state.page=p;renderMain();window.scrollTo({top:0,behavior:'smooth'})}
$('topSearch').oninput=()=>{state.keyword=$('topSearch').value;if($('keyword'))$('keyword').value=state.keyword;state.page=1;renderMain()};initNav();render();
</script></body></html>
