:100%;border-radius:999px;background:linear-gradient(90deg,#2563eb,#06b6d4)}.table-card{overflow:hidden}.toolbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line);color:#64748b;font-weight:750}table{width:100%;border-collapse:collapse;background:white}th{height:48px;text-align:left;color:#64748b;font-size:13px;border-bottom:1px solid var(--line);padding:0 18px;background:#fbfdff;white-space:nowrap;cursor:pointer}td{padding:15px 18px;border-bottom:1px solid #eef2f7;vertical-align:middle}.maincell strong{display:block;font-size:15px}.maincell span{color:#64748b;font-size:13px}.tags{display:flex;gap:6px;flex-wrap:wrap}.tag{font-size:12px;border-radius:999px;padding:5px 8px;background:#f1f5f9;color:#475569;font-weight:800}.tag.blue{background:#dbeafe;color:#1d4ed8}.tag.red{background:#fee2e2;color:#b91c1c}.tag.orange{background:#ffedd5;color:#c2410c}.tag.green{background:#dcfce7;color:#15803d}.tag.purple{background:#ede9fe;color:#6d28d9}.status{display:inline-flex;border-radius:999px;padding:6px 10px;background:#e0f2fe;color:#0369a1;font-size:12px;font-weight:850}.status.green{background:#dcfce7;color:#15803d}.status.red{background:#fee2e2;color:#b91c1c}.status.orange{background:#ffedd5;color:#c2410c}.pager{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:16px 20px;background:#fff}.pager button{height:34px;min-width:34px;border:1px solid #cbd5e1;background:white;border-radius:8px;cursor:pointer;font-weight:700;color:#334155}.pager button.active{background:#2563eb;color:white;border-color:#2563eb}.pager button:disabled{opacity:.45;cursor:not-allowed}.empty{padding:36px;text-align:center;color:#64748b}.mini{color:#64748b;font-size:12px}@media(max-width:1300px){.stats{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:repeat(3,1fr)}.charts{grid-template-columns:1fr}.topsearch{width:320px}.sidebar{width:246px}}
</style></head><body><div class="app"><aside class="sidebar"><div class="brand"><div class="logo">💼</div><div>财税方案数据看板</div></div><nav class="nav" id="nav"></nav><div class="logout">完整交互版 Demo</div></aside><main class="main"><header class="topbar"><div class="crumb" id="crumb">后台 / 系统总览</div><div class="topsearch"><input id="topSearch" placeholder="全局搜索当前模块 🔍"></div><div class="user"><div class="avatar">朱</div><div><div class="u1">朱洪雷</div><div class="u2">方案负责人</div></div></div><button class="create" onclick="resetAll()">重置视图</button></header><section class="content"><div class="eyebrow" id="eyebrow">运营总览</div><h1 class="title" id="title">系统总览</h1><div class="desc" id="desc">完整支持客户、方案、成交、佣金、回访多模块交互。</div><section class="stats" id="stats"></section><div class="quick" id="quick"></div><section class="card filter"><div class="grid" id="filters"></div><div class="actions"><button class="btn primary" onclick="applyFilters()">筛选</button><button class="btn outline" onclick="resetAll()">重置</button></div></section><section class="charts"><div class="card chart"><h3 id="chart1Title">分布统计</h3><div class="bars" id="chart1"></div></div><div class="card chart"><h3 id="chart2Title">阶段统计</h3><div class="bars" id="chart2"></div></div></section><section class="card table-card"><div class="toolbar"><span id="resultText"></span><span id="pageText"></span></div><table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table><div id="empty" class="empty" style="display:none">没有符合条件的数据，试试重置筛选。</div><div class="pager" id="pager"></div></section></section></main></div><script>
const names=['华盛国际','星河控股','鼎新实业','蓝海科技','远山资本','嘉禾贸易','安信家族','瑞和医疗','明德教育','启明新能源','宏图建设','云启咨询','金石投资','天成制造','恒远供应链','中晟集团','海纳资产','卓越传媒','信达生物','万象餐饮'];
const sources=['微信小程序','渠道推荐','老客户转介绍','线下活动','官网咨询','私域社群']; const countries=['新加坡,香港','美国,香港','日本,新加坡','土耳其,多米尼克','欧洲,澳大利亚','香港,新加坡','瓦努阿图,香港','美国,新加坡']; const projects=['家办/税务规划','CRS资产合规','身份+税务组合','企业出海架构','快速身份','香港高才+税务','全球资产配置','家族信托规划']; const budgets=['100-300万','300-800万','800-1500万','1500万以上']; const grades=['A级','B级','C级','S级']; const stages=['待回访','已提交问卷','诊断草案','方案沟通','合同洽谈','已签约']; const deals=['未成交','跟进中','已成交','暂停']; const planStages=['诊断草案','A/B/C/D方案选择','方案已发送','客户已确认','已归档']; const commissionStatus=['未结佣','部分结佣','已结佣']; const payStatus=['未发放','待发放','已发放'];
const date=(i)=>{let d=new Date('2026-06-12');d.setDate(d.getDate()-(i*3)%75);return d.toISOString().slice(0,10)}; const budgetMid=b=>({'100-300万':200,'300-800万':550,'800-1500万':1150,'1500万以上':2000}[b]||0);
const customers=Array.from({length:100},(_,idx)=>{let i=idx+1;if(i===1)return{id:'CASE-001',name:'示例客户A',source:'微信小程序',country:'新加坡,香港',project:'家办/税务规划',budget:'300-800万',grade:'A级',stage:'已提交问卷',deal:'未成交',date:'2026-06-07',amount:550}; if(i===2)return{id:'CASE-002',name:'示例客户B',source:'渠道推荐',country:'土耳其,多米尼克',project:'快速身份',budget:'100-300万',grade:'B级',stage:'待回访',deal:'未成交',date:'2026-06-08',amount:200}; let b=budgets[i%4]; return{id:`TAX-${String(i).padStart(4,'0')}`,name:`${names[i%20]}${String(i).padStart(3,'0')}`,source:sources[i%6],country:countries[i%8],project:projects[i%8],budget:b,grade:grades[i%4],stage:stages[(i*2)%6],deal:deals[(i*5+Math.floor(i/7))%4],date:date(i),amount:budgetMid(b)}});
const plans=customers.slice(0,80).map((c,i)=>({id:`PLAN-${String(i+1).padStart(4,'0')}`,name:`${c.name}-${c.project}方案`,customer:c.name,country:c.country,stage:planStages[(i*2)%5],amount:c.amount*10000,owner:['张顾问','李顾问','王经理','赵老师'][i%4],date:date(i+4)}));
const dealsData=customers.filter(c=>c.deal==='已成交').concat(customers.slice(10,42)).slice(0,60).map((c,i)=>({id:`DEAL-${String(i+1).padStart(4,'0')}`,customer:c.name,country:c.country.split(',')[0],project:c.project,amount:c.amount*10000,commission:Math.round(c.amount*10000*0.06),status:commissionStatus[i%3],date:date(i+8)}));
const commissions=dealsData.map((d,i)=>({id:`COM-${String(i+1).padStart(4,'0')}`,customer:d.customer,country:d.country,project:d.project,commission:d.commission,status:d.status,pay:payStatus[(i+1)%3],planDate:date(i+20),paidDate:(i%3===1?date(i+30):'')}));
const callbacks=customers.slice(0,70).map((c,i)=>({id:`CALL-${String(i+1).padStart(4,'0')}`,customer:c.name,type:['首次回访','方案跟进','合同推进','补充资料','佣金提醒'][i%5],owner:['张顾问','李顾问','王经理','赵老师'][i%4],priority:['高','中','低'][i%3],status:['待回访','今日到期','已完成','已逾期'][i%4],date:date(i+2),note:['确认预算','推进方案会','补充家庭资产信息','提醒签约','核对佣金节点'][i%5]}));
const modules={overview:{icon:'📊',title:'系统总览',desc:'完整支持客户、方案、成交、佣金、回访多模块交互。',data:customers},customers:{icon:'👥',title:'客户管理',desc:'客户线索搜索、筛选、排序、分页。',data:customers},plans:{icon:'🧾',title:'方案管理',desc:'查看方案阶段、国家组合、预估金额与负责人。',data:plans},deals:{icon:'💰',title:'成交录单',desc:'查看成交项目、成交金额、佣金与结佣状态。',data:dealsData},commissions:{icon:'🏦',title:'佣金管理',desc:'查看佣金金额、结佣状态、发放状态和预计日期。',data:commissions},callbacks:{icon:'📞',title:'回访提醒',desc:'查看待回访、今日到期、逾期和已完成提醒。',data:callbacks}};
const moduleOrder=['overview','customers','plans','deals','commissions','callbacks']; const pageSize=10; let cur='overview', state={keyword:'',f1:'',f2:'',f3:'',sort:'date_desc',page:1}; const $=id=>document.getElementById(id); const fmt=n=>Number(n||0).toLocaleString('zh-CN');
function uniq(rows,k){return [...new Set(rows.map(r=>r[k]).filter(Boolean))]} function cls(v){if(['已成交','已签约','已完成','已发放','已结佣'].includes(v))return'green'; if(['未成交','暂停','已逾期','未发放','未结佣'].includes(v))return'red'; if(['合同洽谈','今日到期','待发放','部分结佣'].includes(v))return'orange'; return''} function tag(v){if(v==='S级')return'purple'; if(v==='A级')return'blue'; if(v==='1500万以上')return'orange'; if(v==='100-300万')return'green'; return''}
function initNav(){ $('nav').innerHTML=moduleOrder.map(k=>`<button data-m="${k}" class="${k===cur?'active':''}">${modules[k].icon} ${modules[k].title}</button>`).join(''); document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>switchModule(b.dataset.m));}
function switchModule(k){cur=k;state={keyword:'',f1:'',f2:'',f3:'',sort:'date_desc',page:1};$('topSearch').value='';initNav();render();}
function cfg(){return {overview:{filters:[['source','客户来源'],['grade','客户等级'],['stage','跟进阶段']],charts:['source','budget'],heads:['客户','意向国家/项目','画像标签','客户来源','跟进阶段','成交状态','生成时间']},customers:{filters:[['source','客户来源'],['grade','客户等级'],['deal','成交状态']],charts:['source','stage'],heads:['客户','意向国家/项目','画像标签','客户来源','跟进阶段','成交状态','生成时间']},plans:{filters:[['stage','方案阶段'],['owner','负责人'],['country','国家组合']],charts:['stage','owner'],heads:['方案','客户','国家组合','方案阶段','负责人','预估金额','生成日期']},deals:{filters:[['country','成交国家'],['project','成交项目'],['status','结佣状态']],charts:['country','status'],heads:['成交编号','客户','项目','成交国家','成交金额','佣金金额','结佣状态']},commissions:{filters:[['country','国家'],['status','结佣状态'],['pay','发放状态']],charts:['status','pay'],heads:['佣金编号','客户','项目','国家','佣金金额','结佣状态','发放状态']},callbacks:{filters:[['type','回访类型'],['owner','负责人'],['status','回访状态']],charts:['status','priority'],heads:['提醒编号','客户','回访类型','负责人','优先级','状态','计划日期']}}[cur]}
function fieldValue(r,k){return k==='customer'?r.customer:r[k]} function filtered(){let rows=[...modules[cur].data], c=cfg(); let kw=state.keyword.trim().toLowerCase(); rows=rows.filter(r=>{let text=Object.values(r).join(' ').toLowerCase(); let ok=!kw||text.includes(kw); c.filters.forEach(([k],idx)=>{let v=state['f'+(idx+1)]; if(v&&String(fieldValue(r,k))!==v)ok=false}); return ok}); rows.sort((a,b)=>{let s=state.sort;if(s==='date_desc')return String(b.date||b.planDate||'').localeCompare(String(a.date||a.planDate||''));if(s==='date_asc')return String(a.date||a.planDate||'').localeCompare(String(b.date||b.planDate||''));if(s==='amount_desc')return (b.amount||b.commission||0)-(a.amount||a.commission||0);if(s==='amount_asc')return (a.amount||a.commission||0)-(b.amount||b.commission||0);if(s==='name_asc')return String(a.name||a.customer||a.id).localeCompare(String(b.name||b.customer||b.id),'zh');return 0});return rows}
function renderStats(rows){let total=rows.length;let amount=rows.reduce((sum,r)=>sum+(Number(r.amount)||Number(r.commission)||0),0);let s1=rows.filter(r=>['S级','A级','已成交','已结佣','已完成'].includes(r.grade||r.deal||r.status)).length;let s2=rows.filter(r=>['跟进中','合同洽谈','待发放','今日到期'].includes(r.deal||r.stage||r.pay||r.status)).length;let s3=rows.filter(r=>['未成交','未结佣','未发放','已逾期'].includes(r.deal||r.status||r.pay)).length;let arr=[['总记录',total,'当前模块记录数'],['重点项',s1,'高价值/已完成'],['推进中',s2,'正在处理'],['待处理',s3,'需关注'],['金额合计',Number.isFinite(amount)&&amount?Math.round(amount/10000)+'万':'—','成交/佣金口径'],['当前页',state.page,'分页位置']];$('stats').innerHTML=arr.map((x,i)=>`<div class="card stat ${i===0?'active':''}"><div class="label">${x[0]}</div><div class="num">${fmt(x[1])}</div><div class="hint">${x[2]}</div></div>`).join('')}
function renderFilters(){let rows=modules[cur].data,c=cfg();$('filters').innerHTML=`<div class="field"><label>搜索</label><input class="input" id="keyword" placeholder="输入关键词"></div>`+c.filters.map(([k,l],i)=>`<div class="field"><label>${l}</label><select id="f${i+1}"><option value="">全部</option>${uniq(rows,k).map(v=>`<option value="${v}">${v}</option>`).join('')}</select></div>`).join('')+`<div class="field"><label>排序</label><select id="sort"><option value="date_desc">最新</option><option value="date_asc">最早</option><option value="amount_desc">金额最高</option><option value="amount_asc">金额最低</option><option value="name_asc">名称 A-Z</option></select></div>`; $('keyword').value=state.keyword; ['f1','f2','f3','sort'].forEach(id=>{let el=$(id); if(el){el.value=state[id]||''; el.onchange=applyFilters}}); $('keyword').oninput=()=>{state.keyword=$('keyword').value;state.page=1;renderMain()}}
function renderBars(rows,k,el,title){$('chart'+el+'Title').textContent=title;let counts={};rows.forEach(r=>{let v=fieldValue(r,k)||'未填写';counts[v]=(counts[v]||0)+1});let max=Math.max(1,...Object.values(counts));$('chart'+el).innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([v,n])=>`<div class="bar-row"><span>${v}</span><div class="bar"><span style="width:${Math.max(6,n/max*100)}%"></span></div><b>${n}</b></div>`).join('')}
function cell(r,h){if(['客户','方案','成交编号','佣金编号','提醒编号'].includes(h))return `<td class="maincell"><strong>${r.id||r.name}</strong><span>${r.name||r.customer||r.note||''}</span></td>`; if(h==='意向国家/项目')return `<td><b>${r.country}</b><br><span class="mini">${r.project}</span></td>`; if(h==='画像标签')return `<td><div class="tags"><span class="tag ${tag(r.grade)}">${r.grade}</span><span class="tag ${tag(r.budget)}">${r.budget}</span></div></td>`; if(['跟进阶段','成交状态','方案阶段','结佣状态','发放状态','状态'].includes(h)){let v=r.stage||r.deal||r.status||r.pay; if(h==='成交状态')v=r.deal; if(h==='结佣状态')v=r.status; if(h==='发放状态')v=r.pay; return `<td><span class="status ${cls(v)}">${v}</span></td>`} if(['预估金额','成交金额','佣金金额'].includes(h))return `<td><b>${fmt(h==='佣金金额'?r.commission:r.amount)}</b></td>`; let map={'客户':r.customer,'客户来源':r.source,'生成时间':r.date,'国家组合':r.country,'负责人':r.owner,'生成日期':r.date,'成交国家':r.country,'成交项目':r.project,'项目':r.project,'国家':r.country,'计划日期':r.date,'回访类型':r.type,'优先级':r.priority}; return `<td>${map[h]||r[h]||''}</td>`}
function renderTable(rows){let c=cfg(), pages=Math.max(1,Math.ceil(rows.length/pageSize)); if(state.page>pages)state.page=pages; let part=rows.slice((state.page-1)*pageSize,state.page*pageSize); $('thead').innerHTML=c.heads.map(h=>`<th>${h}</th>`).join(''); $('tbody').innerHTML=part.map(r=>`<tr>${c.heads.map(h=>cell(r,h)).join('')}</tr>`).join(''); $('empty').style.display=rows.length?'none':'block'; $('resultText').textContent=`共 ${rows.length} 条结果`; $('pageText').textContent=`第 ${state.page} / ${pages} 页`; $('pager').innerHTML=`<button onclick="goPage(${state.page-1})" ${state.page===1?'disabled':''}>‹</button>`+Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-state.page)<=2).map((p,i,a)=>`${i&&p-a[i-1]>1?'<span>…</span>':''}<button class="${p===state.page?'active':''}" onclick="goPage(${p})">${p}</button>`).join('')+`<button onclick="goPage(${state.page+1})" ${state.page===pages?'disabled':''}>›</button>`}
function renderQuick(){let c=cfg();$('quick').innerHTML=`<button class="on" onclick="state.sort='date_desc';state.page=1;renderMain()">最新</button><button onclick="state.sort='amount_desc';state.page=1;renderMain()">金额最高</button><button onclick="state.sort='name_asc';state.page=1;renderMain()">名称排序</button><button onclick="resetAll()">清空筛选</button>`}
function render(){let m=modules[cur];$('crumb').textContent='后台 / '+m.title;$('title').textContent=m.title;$('desc').textContent=m.desc;renderFilters();renderQuick();renderMain()} function renderMain(){let rows=filtered(), c=cfg();renderStats(rows);renderBars(rows,c.charts[0],1,c.filters[0]?.[1]||'分布统计');renderBars(rows,c.charts[1],2,c.filters[1]?.[1]||'阶段统计');renderTable(rows)} function applyFilters(){state.keyword=$('keyword')?.value||'';['f1','f2','f3','sort'].forEach(id=>{if($(id))state[id]=$(id).value});state.page=1;renderMain()} function resetAll(){state={keyword:'',f1:'',f2:'',f3:'',sort:'date_desc',page:1};$('topSearch').value='';render()} function goPage(p){state.page=p;renderMain();window.scrollTo({top:0,behavior:'smooth'}) }
$('topSearch').oninput=()=>{state.keyword=$('topSearch').value;if($('keyword'))$('keyword').value=state.keyword;state.page=1;renderMain()};initNav();render();
</script></body></html>
