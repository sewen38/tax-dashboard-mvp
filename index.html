['source','grade','stage','deal','budget'].forEach(id=>fillSelect(id,id));
function rankGrade(g){return {'S级':4,'A级':3,'B级':2,'C级':1}[g]||0}function fmt(n){return n.toLocaleString('zh-CN')}
function filtered(){let kw=(state.keyword||'').trim().toLowerCase();let rows=DATA.filter(r=>{let ok=!kw||[r.id,r.name,r.country,r.project,r.source,r.grade,r.stage,r.deal,r.budget].join(' ').toLowerCase().includes(kw);['source','grade','stage','deal','budget'].forEach(k=>{if(state[k]&&r[k]!==state[k])ok=false});if(state.stat==='highValue'&&!['S级','A级'].includes(r.grade))ok=false;if(state.stat==='active'&&r.deal!=='跟进中')ok=false;if(state.stat==='closed'&&r.deal!=='已成交')ok=false;if(state.stat==='deep'&&!['方案沟通','合同洽谈','已签约'].includes(r.stage))ok=false;return ok});let s=state.sort;rows.sort((a,b)=>{if(s==='date_desc')return b.date.localeCompare(a.date);if(s==='date_asc')return a.date.localeCompare(b.date);if(s==='budget_desc')return b.budgetMid-a.budgetMid;if(s==='budget_asc')return a.budgetMid-b.budgetMid;if(s==='grade_desc')return rankGrade(b.grade)-rankGrade(a.grade);if(s==='name_asc')return a.name.localeCompare(b.name,'zh');if(s==='id')return a.id.localeCompare(b.id);if(s==='country')return a.country.localeCompare(b.country,'zh');if(s==='grade')return rankGrade(b.grade)-rankGrade(a.grade);if(s==='source')return a.source.localeCompare(b.source,'zh');if(s==='stage')return a.stage.localeCompare(b.stage,'zh');if(s==='deal')return a.deal.localeCompare(b.deal,'zh');if(s==='date')return b.date.localeCompare(a.date);return 0});return rows}
function statCard(key,label,num,hint,active){return `<div class="card stat ${active?'active':''}" onclick="clickStat('${key}')"><div class="label">${label}</div><div class="num">${num}</div><div class="hint">${hint}</div></div>`}
function renderStats(rows){let all=rows.length, high=rows.filter(r=>['S级','A级'].includes(r.grade)).length, active=rows.filter(r=>r.deal==='跟进中').length, closed=rows.filter(r=>r.deal==='已成交').length, deep=rows.filter(r=>['方案沟通','合同洽谈','已签约'].includes(r.stage)).length, amount=rows.reduce((s,r)=>s+r.budgetMid,0)/10000; $('stats').innerHTML=[statCard('', '全部客户', fmt(all), '当前筛选客户总量', state.stat===''),statCard('highValue','S/A级客户',fmt(high),'高价值客户池',state.stat==='highValue'),statCard('active','跟进中',fmt(active),'成交状态为跟进中',state.stat==='active'),statCard('closed','已成交',fmt(closed),'成交状态为已成交',state.stat==='closed'),statCard('deep','方案沟通/洽谈',fmt(deep),'进入深度转化阶段',state.stat==='deep'),statCard('', '预估成交额', amount.toFixed(1)+'亿', '按预算区间估算', false)].join('')}
function renderBars(rows,key,el){let counts={};rows.forEach(r=>counts[r[key]]=(counts[r[key]]||0)+1);let max=Math.max(1,...Object.values(counts));$(el).innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="bar-row"><span>${k}</span><div class="bar"><span style="width:${Math.max(6,v/max*100)}%"></span></div><b>${v}</b></div>`).join('')}
function statusClass(v){if(v==='已成交'||v==='已签约')return 'green';if(v==='未成交'||v==='暂停')return 'red';if(v==='合同洽谈')return 'orange';return ''}function tagGrade(g){return g==='S级'?'purple':g==='A级'?'blue':''}function tagBudget(b){return b==='1500万以上'?'orange':b==='100-300万'?'green':b==='800-1500万'?'blue':''}
function renderTable(rows){let pages=Math.max(1,Math.ceil(rows.length/pageSize));if(state.page>pages)state.page=pages;let start=(state.page-1)*pageSize;let part=rows.slice(start,start+pageSize);$('tbody').innerHTML=part.map(r=>`<tr><td class="project"><strong>${r.id}</strong><span>${r.name}</span></td><td><b>${r.country}</b><br><span style="color:#64748b">${r.project}</span></td><td><div class="tags"><span class="tag ${tagGrade(r.grade)}">${r.grade}</span><span class="tag ${tagBudget(r.budget)}">${r.budget}</span></div></td><td>${r.source}</td><td><span class="status ${statusClass(r.stage)}">${r.stage}</span></td><td><span class="status ${statusClass(r.deal)}">${r.deal}</span></td><td>${r.date}</td></tr>`).join('');$('empty').style.display=rows.length?'none':'block';$('resultText').textContent=`共 ${rows.length} 个客户结果`;$('pageText').textContent=`第 ${state.page} / ${pages} 页`;$('pager').innerHTML=`<button onclick="goPage(${state.page-1})" ${state.page===1?'disabled':''}>‹</button>`+Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-state.page)<=2).map((p,i,a)=>`${i&&p-a[i-1]>1?'<span>…</span>':''}<button class="${p===state.page?'active':''}" onclick="goPage(${p})">${p}</button>`).join('')+`<button onclick="goPage(${state.page+1})" ${state.page===pages?'disabled':''}>›</button>`}
function render(){let rows=filtered();renderStats(rows);renderBars(rows,'source','sourceBars');renderBars(rows,'budget','budgetBars');renderTable(rows)}function syncFromInputs(){state.keyword=$('keyword').value||$('topSearch').value;['source','grade','stage','deal','budget','sort'].forEach(k=>state[k]=$(k).value);state.page=1}function applyFilters(){syncFromInputs();render()}function resetAll(){state={keyword:'',source:'',grade:'',stage:'',deal:'',budget:'',sort:'date_desc',page:1,stat:''};$('keyword').value='';$('topSearch').value='';['source','grade','stage','deal','budget'].forEach(k=>$(k).value='');$('sort').value='date_desc';document.querySelectorAll('#quick button').forEach((b,i)=>b.classList.toggle('on',i===0));render()}function goPage(p){state.page=p;render();window.scrollTo({top:0,behavior:'smooth'})}function setSort(s){state.sort=s;$('sort').value=['date_desc','date_asc','budget_desc','budget_asc','grade_desc','name_asc'].includes(s)?s:$('sort').value;state.page=1;render()}function clickStat(k){state.stat=state.stat===k?'':k;state.page=1;render()}
$('keyword').addEventListener('input',()=>{state.keyword=$('keyword').value;state.page=1;render()});$('topSearch').addEventListener('input',()=>{$('keyword').value=$('topSearch').value;state.keyword=$('topSearch').value;state.page=1;render()});['source','grade','stage','deal','budget','sort'].forEach(k=>$(k).addEventListener('change',applyFilters));document.querySelectorAll('#quick button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('#quick button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');if(btn.dataset.sort){state.sort=btn.dataset.sort;$('sort').value=state.sort}['grade','deal','budget','stage'].forEach(k=>{if(btn.dataset['filter'+k[0].toUpperCase()+k.slice(1)]){state[k]=btn.dataset['filter'+k[0].toUpperCase()+k.slice(1)];$(k).value=state[k]}});state.page=1;render()}));render();
</script></body></html>
